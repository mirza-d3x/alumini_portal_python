databases:
  - name: alumni_db
    databaseName: alumni_portal
    user: alumni_user
    plan: free
    region: ohio

services:
  - type: web
    name: alumni_backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn alumni_backend.wsgi:application"
    plan: free
    region: ohio
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: alumni_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.10.12"
